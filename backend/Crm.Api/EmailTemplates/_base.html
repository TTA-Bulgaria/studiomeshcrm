<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="X-UA-Compatible" content="IE=edge" />
  <title>Studio Mesh CRM</title>
  <style>
    body { margin: 0; padding: 0; background-color: #f4f4f7; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
    .wrapper { width: 100%; background-color: #f4f4f7; padding: 40px 20px; box-sizing: border-box; }
    .container { max-width: 580px; margin: 0 auto; background-color: #ffffff; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
    .header { background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); padding: 32px 40px; text-align: center; }
    .header-logo { color: #ffffff; font-size: 22px; font-weight: 700; letter-spacing: -0.5px; margin: 0; }
    .header-tagline { color: #ddd6fe; font-size: 13px; margin: 4px 0 0; }
    .body { padding: 40px; color: #374151; }
    .body h1 { font-size: 22px; font-weight: 700; color: #111827; margin: 0 0 16px; }
    .body p { font-size: 15px; line-height: 1.7; color: #4b5563; margin: 0 0 16px; }
    .btn { display: inline-block; background: linear-gradient(135deg, #7c3aed 0%, #6d28d9 100%); color: #ffffff !important; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-size: 15px; font-weight: 600; margin: 8px 0 24px; }
    .divider { border: none; border-top: 1px solid #e5e7eb; margin: 24px 0; }
    .notice { background-color: #f5f3ff; border-left: 4px solid #7c3aed; border-radius: 4px; padding: 14px 18px; font-size: 13px; color: #5b21b6; margin: 0 0 16px; }
    .link-fallback { font-size: 12px; color: #9ca3af; word-break: break-all; }
    .footer { background-color: #f9fafb; border-top: 1px solid #e5e7eb; padding: 24px 40px; text-align: center; }
    .footer p { font-size: 12px; color: #9ca3af; margin: 4px 0; line-height: 1.6; }
    .footer a { color: #7c3aed; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="container">
      <div class="header">
        <p class="header-logo">Studio Mesh CRM</p>
        <p class="header-tagline">Precision growth for digital agencies</p>
      </div>
      <div class="body">
        {{ content }}
      </div>
      <div class="footer">
        <p>© 2026 Studio Mesh CRM · <a href="https://studiomeshcrm.com">studiomeshcrm.com</a></p>
        <p>If you did not expect this email, you can safely ignore it.</p>
      </div>
    </div>
  </div>
</body>
</html>
